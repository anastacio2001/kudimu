name: Deploy to Cloudflare Pages

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'dados_kudimu/kudimu-master/Desktop/Kudimu/package-lock.json'
          
      - name: Install dependencies
        working-directory: dados_kudimu/kudimu-master/Desktop/Kudimu
        run: npm ci
        
      - name: Build project
        working-directory: dados_kudimu/kudimu-master/Desktop/Kudimu
        run: npm run build
        
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: kudimu
          directory: dados_kudimu/kudimu-master/Desktop/Kudimu/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Deploy Workers (optional)
        working-directory: dados_kudimu/kudimu-master/Desktop/Kudimu
        run: |
          npm install -g wrangler
          echo "${{ secrets.CLOUDFLARE_API_TOKEN }}" | wrangler auth api-token
          wrangler pages deploy dist --project-name=kudimu
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}